name: Robot-Rekap

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  job-rekap-dan-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Library
        run: |
          pip install firebase-admin pytz gdown
          pip install -r requirements.txt

      - name: Cek Cache Model AI
        id: cache-models
        uses: actions/cache@v3
        with:
          path: model_ai
          key: ai-models-v1

      - name: Download Model AI dari Google Drive
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p model_ai
          # FIXED: Menghapus argumen --id
          gdown "1InRo2Z7goQsi5m_OExDKOOUPdn4qXh66" -O "model_ai/model_sarimax_kairo (1).pkl"
          gdown "1Q5G4sOR4wi-5OWqes2zwU4AvMni8meMY" -O "model_ai/model_rl_kairo (1).zip"

      - name: Run Script Rekap Harian
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python rekap_harian.py

      - name: Jalankan Mandor AI
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }} 
        run: python pekerja_ai.py
