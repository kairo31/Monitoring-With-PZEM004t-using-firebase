name: Robot-Rekap-Kairo-dan-AI

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  job-rekap-dan-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Library
        run: |
          pip install firebase-admin pytz
          pip install -r requirements.txt

      - name: Run Script Rekap Harian
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }} # Ini jembatan kuncinya!
        run: python rekap_harian.py

      - name: Jalankan Mandor AI
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }} # Ini juga jembatan kuncinya!
        run: python pekerja_ai.py
