name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    env:
      SARIMAX_DRIVE_URL: ${{ secrets.SARIMAX_DRIVE_URL }}
      RL_DRIVE_URL: ${{ secrets.RL_DRIVE_URL }}
      SARIMAX_DRIVE_FILE_ID: ${{ secrets.SARIMAX_DRIVE_FILE_ID }}
      RL_DRIVE_FILE_ID: ${{ secrets.RL_DRIVE_FILE_ID }}
      SARIMAX_KWH_DRIVE_URL: ${{ secrets.SARIMAX_KWH_DRIVE_URL }}
      DEFAULT_SARIMAX_DAYA_URL: https://drive.google.com/file/d/1syzoFBIGYGLbYkzGYgP-n0zodYRz-Uie/view?usp=drive_link
      DEFAULT_SARIMAX_KWH_URL: https://drive.google.com/file/d/1uquQtO9A7HRiwSGUqj-30Y7jxZparoFn/view?usp=drive_link
      DEFAULT_RL_URL: https://drive.google.com/file/d/1Q5G4sOR4wi-5OWqes2zwU4AvMni8meMY/view?usp=drive_link
      RL_MODEL_PATH: model_ai/model_rl_budget_v2.pt
      LEGACY_RL_MODEL_PATH: model_ai/model_rl_budget.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile pekerja_ai.py rekap_harian.py sarimax_utils.py sarimax_firebase_train.py rl_retrain_budget.py model_ai/pekerja_ai.py
          
      - name: Cek Cache Model AI
        id: cache-models-ci
        uses: actions/cache@v3
        with:
          path: model_ai
          key: ai-models-ci-latest

      - name: Download Model AI dari Google Drive
        if: steps.cache-models-ci.outputs.cache-hit != 'true'
        run: |
          mkdir -p model_ai
          python -m pip install gdown
          if [ -n "${SARIMAX_DRIVE_URL}" ]; then
            gdown "${SARIMAX_DRIVE_URL}" -O "model_ai/sarimax_bundle.pkl"
          elif [ -n "${SARIMAX_DRIVE_FILE_ID}" ]; then
            gdown "${SARIMAX_DRIVE_FILE_ID}" -O "model_ai/sarimax_bundle.pkl"
          else
            gdown "${DEFAULT_SARIMAX_DAYA_URL}" -O "model_ai/sarimax_bundle.pkl"
          fi
          
          if [ -n "${RL_DRIVE_URL}" ]; then
            gdown "${RL_DRIVE_URL}" -O "${RL_MODEL_PATH}"
          elif [ -n "${RL_DRIVE_FILE_ID}" ]; then
            gdown "${RL_DRIVE_FILE_ID}" -O "${RL_MODEL_PATH}"
          else
            gdown "${DEFAULT_RL_URL}" -O "${LEGACY_RL_MODEL_PATH}"
          fi
          
          if [ -n "${SARIMAX_KWH_DRIVE_URL}" ]; then
            gdown "${SARIMAX_KWH_DRIVE_URL}" -O "model_ai/sarimax_kwh_jam.pkl"
          else
            gdown "${DEFAULT_SARIMAX_KWH_URL}" -O "model_ai/sarimax_kwh_jam.pkl"
          fi
          
      - name: Cek Hasil Download
        run: |
          echo " === HASIL DOWNLOAD ==="
          ls -la model_ai/
