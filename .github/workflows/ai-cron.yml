name: AI Cron Pipeline

on:
  workflow_dispatch:
    inputs:
      run_rekap:
        description: "Run Rekap Harian"
        required: false
        default: "true"
      run_worker:
        description: "Run Pekerja AI"
        required: false
        default: "true"
      retrain_sarimax:
        description: "Run SARIMAX retraining"
        required: false
        default: "false"
      retrain_rl:
        description: "Run RL retraining"
        required: false
        default: "false"
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-pipeline:
    if: ${{ secrets.FIREBASE_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
      TARIF_PER_KWH: ${{ secrets.TARIF_PER_KWH }}
      DEFAULT_MONTHLY_TARGET_RP: ${{ secrets.DEFAULT_MONTHLY_TARGET_RP }}
      RL_MODEL_PATH: model_ai/model_rl_budget.zip
      SARIMAX_MODEL_PATH: model_ai/sarimax_bundle.pkl
      RL_DRIVE_FILE_ID: ${{ secrets.RL_DRIVE_FILE_ID }}
      SARIMAX_DRIVE_FILE_ID: ${{ secrets.SARIMAX_DRIVE_FILE_ID }}
      RL_DRIVE_URL: ${{ secrets.RL_DRIVE_URL }}
      SARIMAX_DRIVE_URL: ${{ secrets.SARIMAX_DRIVE_URL }}
      SARIMAX_KWH_DRIVE_URL: ${{ secrets.SARIMAX_KWH_DRIVE_URL }}
      DEFAULT_SARIMAX_DAYA_URL: https://drive.google.com/file/d/1syzoFBIGYGLbYkzGYgP-n0zodYRz-Uie/view?usp=drive_link
      DEFAULT_SARIMAX_KWH_URL: https://drive.google.com/file/d/1uquQtO9A7HRiwSGUqj-30Y7jxZparoFn/view?usp=drive_link
      DEFAULT_RL_URL: https://drive.google.com/file/d/1Q5G4sOR4wi-5OWqes2zwU4AvMni8meMY/view?usp=drive_link

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cek Cache Model AI
        id: cache-models
        uses: actions/cache@v3
        with:
          path: model_ai
          key: ai-models-latest

      - name: Download AI models from Google Drive
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p model_ai
          python -m pip install gdown
          if [ -n "${SARIMAX_DRIVE_URL}" ]; then
            gdown "${SARIMAX_DRIVE_URL}" -O "${SARIMAX_MODEL_PATH}"
          elif [ -n "${SARIMAX_DRIVE_FILE_ID}" ]; then
            gdown "${SARIMAX_DRIVE_FILE_ID}" -O "${SARIMAX_MODEL_PATH}"
          else
            gdown "${DEFAULT_SARIMAX_DAYA_URL}" -O "${SARIMAX_MODEL_PATH}"
          fi
          if [ -n "${RL_DRIVE_URL}" ]; then
            gdown "${RL_DRIVE_URL}" -O "${RL_MODEL_PATH}"
          elif [ -n "${RL_DRIVE_FILE_ID}" ]; then
            gdown "${RL_DRIVE_FILE_ID}" -O "${RL_MODEL_PATH}"
          else
            gdown "${DEFAULT_RL_URL}" -O "${RL_MODEL_PATH}"
          fi
          if [ -n "${SARIMAX_KWH_DRIVE_URL}" ]; then
            gdown "${SARIMAX_KWH_DRIVE_URL}" -O "model_ai/sarimax_kwh_jam.pkl"
          else
            gdown "${DEFAULT_SARIMAX_KWH_URL}" -O "model_ai/sarimax_kwh_jam.pkl"
          fi
          echo "=== Isi folder model_ai ==="
          ls -la model_ai

      - name: Rekap harian
        if: ${{ github.event_name == 'schedule' || inputs.run_rekap == 'true' }}
        run: python rekap_harian.py

      - name: AI worker inference
        if: ${{ github.event_name == 'schedule' || inputs.run_worker == 'true' }}
        run: python pekerja_ai.py

      - name: Retrain SARIMAX
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.retrain_sarimax == 'true' }}
        run: python sarimax_firebase_train.py

      - name: Retrain RL
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.retrain_rl == 'true' }}
        run: python rl_retrain_budget.py

  missing-secrets-info:
    if: ${{ secrets.FIREBASE_KEY == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain missing secrets
        run: |
          echo "FIREBASE_KEY secret belum di-set, job pipeline dilewati." 
          echo "Tambahkan FIREBASE_KEY dan FIREBASE_DB_URL pada repository secrets."
